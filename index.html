<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Altın Rehberim</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #141b2d;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .big {
      font-size: 32px;
      color: #ffd700;
      font-weight: bold;
    }

    .label {
      color: #aaa;
      margin-bottom: 5px;
    }

    .green {
      color: #00d084;
    }

    .loading {
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Altın Rehberim</h1>

  <div class="card">
    <div class="label">Gram Altın (referans)</div>
    <div id="gram" class="big loading">Yükleniyor...</div>
  </div>

  <div class="card">
    <div class="label">Ons Altın ($)</div>
    <div id="ons">...</div>
  </div>

  <div class="card">
    <div class="label">Dolar / TL</div>
    <div id="usd">...</div>
  </div>

  <div class="card">
    <div class="label">Bugün nereden alınmalı?</div>
    <div id="suggest" class="green">Hesaplanıyor...</div>
  </div>

  <div class="card">
    <div class="label">Yorum</div>
    <div id="comment">Bekleniyor...</div>
  </div>
</div>

<script>
async function loadData() {
  try {
    const res = await fetch("/api/live");
    const data = await res.json();

    if (!data.ok) {
      document.getElementById("gram").innerText = "Veri alınamadı";
      return;
    }

    const gram = data.gramTryRef;
    const ons = data.goldUsdOunce;
    const usd = data.usdTry;

    document.getElementById("gram").innerText = gram + " TL";
    document.getElementById("gram").classList.remove("loading");

    document.getElementById("ons").innerText = ons + " $";
    document.getElementById("usd").innerText = usd + " TL";

    // basit analiz
    if (usd > 40) {
      document.getElementById("suggest").innerText = "Kapalıçarşı";
      document.getElementById("comment").innerText =
        "Bankalara göre daha avantajlı görünüyor.";
    } else {
      document.getElementById("suggest").innerText = "Banka";
      document.getElementById("comment").innerText =
        "Bankalar daha uygun olabilir.";
    }

  } catch (e) {
    document.getElementById("gram").innerText = "Hata oluştu";
  }
}

loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
