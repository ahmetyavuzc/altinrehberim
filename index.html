<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Altın Rehberim</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  border-radius:16px;
  padding:20px;
  margin-bottom:15px;
}

.title{
  font-size:22px;
  font-weight:bold;
}

.big{
  font-size:40px;
  font-weight:bold;
  color:#facc15;
}

.green{ color:#22c55e; }
.red{ color:#ef4444; }
.gray{ color:#94a3b8; }

.table{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.beta{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="beta">
⚠️ Beta sürüm – yatırım tavsiyesi değildir
</div>

<div class="card">
<div class="title">BUGÜN EN UCUZ YER</div>
<div id="best" class="big">Yükleniyor...</div>
<div id="diff" class="green"></div>
</div>

<div class="card">
<div class="title">Piyasa Karşılaştırma</div>

<div class="table">
<div>Kapalıçarşı</div>
<div id="kapali">-</div>
</div>

<div class="table">
<div>Banka</div>
<div id="banka">-</div>
</div>

</div>

<div class="card">
<div class="title">Gerçek Değer</div>
<div id="ref" class="big">-</div>
</div>

<div class="card">
<div class="title">Yorum</div>
<div id="comment">Yükleniyor...</div>
</div>

</div>

<script>
async function loadData(){
  try{
    const [liveRes, marketRes] = await Promise.all([
      fetch("/api/live"),
      fetch("/api/market")
    ]);

    const live = await liveRes.json();
    const market = await marketRes.json();

    if(!live.ok || !market.ok){
      document.getElementById("best").innerText = "Veri yok";
      return;
    }

    const kapali = market.kapalicarsi.sell;
    const banka = market.banka.sell;

    document.getElementById("kapali").innerText = kapali + " TL";
    document.getElementById("banka").innerText = banka + " TL";

    document.getElementById("ref").innerText = live.gramTryRef + " TL";

    let best = "";
    let diff = Math.abs(kapali - banka);

    if(kapali < banka){
      best = "Kapalıçarşı";
      document.getElementById("diff").innerText = "+" + diff + " TL avantaj";
      document.getElementById("best").className = "big green";
    } else {
      best = "Banka";
      document.getElementById("diff").innerText = "+" + diff + " TL avantaj";
      document.getElementById("best").className = "big green";
    }

    document.getElementById("best").innerText = best;

    // yorum
    if(live.gramTryRef > 4700){
      document.getElementById("comment").innerText =
        "Fiyatlar yüksek seviyede, acele alım riskli olabilir.";
    } else {
      document.getElementById("comment").innerText =
        "Fiyatlar daha dengeli, karşılaştırarak alım yapılabilir.";
    }

  }catch(e){
    document.getElementById("best").innerText = "Hata";
  }
}

loadData();
setInterval(loadData, 30000);
</script>

</body>
</html>
